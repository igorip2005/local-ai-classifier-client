services:
  postgres:
    image: postgres:16-alpine
    container_name: local-ai-classifier-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: local_ai_classifier
      POSTGRES_PASSWORD: local_ai_classifier
      POSTGRES_DB: local_ai_classifier
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U local_ai_classifier -d local_ai_classifier"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
